# Daily Habit Record
# Runs daily at 12:00 AM EST (05:00 UTC) to record habit status for the previous day
# API-based: Direct endpoint call for reliability

name: "Daily Habit Record"
jobId: "habit-daily-record-001"
sessionTarget: isolated
enabled: true
schedule:
  kind: cron
  expr: "0 5 * * *"
  tz: "UTC"
# API-based approach - faster and more reliable
api:
  endpoint: "https://juno-mission-control.vercel.app/api/habits/daily-record"
  method: "POST"
  timeout: 30
  headers:
    Content-Type: "application/json"
# Fallback AI configuration (if API fails)
payload:
  kind: agentTurn
  message: |
    Record daily habit status by calling the API endpoint.
    
    IMPORTANT: Use the API endpoint first. This AI fallback is only if the API fails.
    
    Execute the following curl command:
    ```
    curl -X POST https://juno-mission-control.vercel.app/api/habits/daily-record \
      -H "Content-Type: application/json" \
      -s
    ```
    
    After execution:
    1. Check the response for success status
    2. Log the result to Activity Log via POST /api/activity-log with:
       - type: "cron"
       - category: "habit-record"
       - content: Summary of recorded habits
    
    Expected response format:
    {
      "success": true,
      "message": "Recorded X/Y habits for 2026-02-24",
      "data": {
        "date": "2026-02-24",
        "completedCount": X,
        "totalCount": Y,
        "completionRate": Z,
        "transferredToEveningCheckin": true
      }
    }
  timeoutSeconds: 60
  thinking: off
