# Daily Habit Reset
# Runs daily at 12:00 AM EST to reset all habit completions for the new day

name: "Daily Habit Reset"
sessionTarget: isolated
enabled: true
schedule:
  kind: cron
  expr: "0 0 * * *"
  tz: "America/New_York"
payload:
  kind: agentTurn
  message: |
    Reset all habit completions for the new day.
    
    Call the /api/habits/reset endpoint to clear yesterday's completions
    and start fresh for today.
    
    STEPS:
    1. POST to /api/habits/reset
    2. The endpoint will reset all habits to completedToday: false
    3. Keep streaks intact (only reset daily completion status)
    
    Log this action to the Activity Log via POST /api/activity-log with type: "cron"
    
    If the API call fails, retry up to 3 times with exponential backoff.
  timeoutSeconds: 60
